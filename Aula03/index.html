<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista</title>

    <style>
        h2{color:  rgb(124, 61, 80);}
        body{font-family: Arial, Helvetica, sans-serif; text-align: center;}
        table {width: 50%; margin: 20px auto; border-collapse: collapse; background-color: rgb(231, 204, 212);}
        th, td {padding: 10px; border: 1px solid rgb(124, 61, 80);}
        button{background-color: rgb(197, 143, 160); border-radius: 50px; border-color: rgb(124, 61, 80); }
        
    </style>

</head>
<body>
    
    <h2>Lista CAT Facts</h2>
    <button onclick="carregarFacts()">Carregar Fatos sobre Gatos</button>

    <table>
        <thead>
            <th>ID</th>
            <th>Texto</th>
            <th>Tamanho</th>
        </thead>
        <tbody id="fact">
            <!--Dados serão carregados automaticamente-->
        </tbody>
    </table>


    <script>
        let cont = 1;

        function carregarFacts() {
           console.log("Entrou na API");    
           
           fetch("http://catfact.ninja/fact")
           .then(response => response.json())
           .then(data => {
                const tabela = document.getElementById("fact");
                //tabela.innerHTML = ""; //limpar a tabela
                const linha = `<tr>
                                <td>${cont}</td>
                                <td>${data.fact}</td>
                                <td>${data.length}</td>
                            </tr>`;

                tabela.innerHTML = tabela.innerHTML + linha;

                cont++;
           })
           .catch(error => console.error("Erro ao buscar fatos: ", error));
        
          
        }
    </script>

</body>
</html>
